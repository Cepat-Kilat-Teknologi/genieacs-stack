# ==============================================================================
# Supervisor Configuration for GenieACS
# ==============================================================================
# Manages 4 GenieACS processes inside a single container:
#   1. genieacs-cwmp  (priority 100) — TR-069/CWMP device management
#   2. genieacs-nbi   (priority 200) — Northbound Interface REST API
#   3. genieacs-fs    (priority 300) — Firmware/file server
#   4. genieacs-ui    (priority 400) — Web management interface
#
# All processes run as the 'genieacs' user (UID 1000) for security.
# Supervisor itself runs as root to manage process lifecycle.
#
# Use supervisorctl to inspect or control processes:
#   docker exec <container> supervisorctl status
#   docker exec <container> supervisorctl restart genieacs-cwmp
# ==============================================================================

[supervisord]
# Run in foreground — required for Docker (container stays alive while supervisor runs)
nodaemon=true
# Supervisor runs as root to manage child process user switching
user=root
logfile=/var/log/genieacs/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/genieacs

# Enable supervisorctl socket for runtime process management
[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# ------------------------------------------------------------------------------
# CWMP Service — TR-069 protocol handler for CPE device communication
# Port: 7547 | Priority: 100 (starts first)
# This is the core service that CPE devices connect to for provisioning.
# ------------------------------------------------------------------------------
[program:genieacs-cwmp]
command=/usr/local/bin/run_with_env.sh genieacs-cwmp
user=genieacs
directory=/opt/genieacs
autostart=true
autorestart=true
stderr_logfile=/var/log/genieacs/genieacs-cwmp-err.log
stdout_logfile=/var/log/genieacs/genieacs-cwmp-out.log
priority=100

# ------------------------------------------------------------------------------
# NBI Service — Northbound Interface REST API
# Port: 7557 | Priority: 200
# Provides RESTful API for external systems to query and control devices.
# In the nbi-auth variant, this is proxied through nginx for API key auth.
# ------------------------------------------------------------------------------
[program:genieacs-nbi]
command=/usr/local/bin/run_with_env.sh genieacs-nbi
user=genieacs
directory=/opt/genieacs
autostart=true
autorestart=true
stderr_logfile=/var/log/genieacs/genieacs-nbi-err.log
stdout_logfile=/var/log/genieacs/genieacs-nbi-out.log
priority=200

# ------------------------------------------------------------------------------
# FS Service — Firmware/File Server
# Port: 7567 | Priority: 300
# Serves firmware images and configuration files to CPE devices.
# Devices download updates from this service during provisioning.
# ------------------------------------------------------------------------------
[program:genieacs-fs]
command=/usr/local/bin/run_with_env.sh genieacs-fs
user=genieacs
directory=/opt/genieacs
autostart=true
autorestart=true
stderr_logfile=/var/log/genieacs/genieacs-fs-err.log
stdout_logfile=/var/log/genieacs/genieacs-fs-out.log
priority=300

# ------------------------------------------------------------------------------
# UI Service — Web Management Interface
# Port: 3000 | Priority: 400 (starts last)
# Browser-based dashboard for managing devices, presets, and provisions.
# Requires JWT authentication when GENIEACS_UI_AUTH=true.
# ------------------------------------------------------------------------------
[program:genieacs-ui]
command=/usr/local/bin/run_with_env.sh genieacs-ui
user=genieacs
directory=/opt/genieacs
autostart=true
autorestart=true
stderr_logfile=/var/log/genieacs/genieacs-ui-err.log
stdout_logfile=/var/log/genieacs/genieacs-ui-out.log
priority=400
