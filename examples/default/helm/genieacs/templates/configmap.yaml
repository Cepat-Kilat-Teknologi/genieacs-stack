{{- /* --------------------------------------------------------------------------
  GenieACS ConfigMap
  Stores non-sensitive configuration only. Secrets (JWT, MongoDB credentials,
  connection strings) are managed separately in secret.yaml.
  -------------------------------------------------------------------------- */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "genieacs.fullname" . }}-config
  labels:
    {{- include "genieacs.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  GENIEACS_UI_AUTH: {{ .Values.config.uiAuth | quote }}
  GENIEACS_EXT_DIR: {{ .Values.config.extDir | quote }}
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
