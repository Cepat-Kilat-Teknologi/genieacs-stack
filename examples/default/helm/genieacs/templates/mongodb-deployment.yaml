{{- /* --------------------------------------------------------------------------
  MongoDB StatefulSet
  Deploys a single-node MongoDB instance using VolumeClaimTemplates for
  persistent storage. Health probes authenticate via mongosh when auth is
  enabled. The fsGroup (999) matches the MongoDB container's default UID.
  -------------------------------------------------------------------------- */}}
{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "genieacs.mongodb.name" . }}
  labels:
    {{- include "genieacs.mongodb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "genieacs.mongodb.name" . }}
  replicas: {{ .Values.mongodb.replicaCount }}
  selector:
    matchLabels:
      {{- include "genieacs.mongodb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "genieacs.mongodb.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        # fsGroup ensures Kubernetes sets group ownership on PVC-mounted volumes
        # so the mongodb user (uid 999) can read/write them.
        # runAsUser/runAsNonRoot are intentionally NOT set because the official
        # mongo image entrypoint starts as root (to chown data dirs), then drops
        # to the mongodb user via gosu.
        fsGroup: 999
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mongodb.service.port }}
              name: mongodb
          {{- if .Values.mongodb.auth.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.mongodb.auth.existingSecret | default (printf "%s-secret" (include "genieacs.mongodb.name" .)) }}
          {{- end }}
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-configdb
              mountPath: /data/configdb
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - >-
                  mongosh --quiet --eval "db.adminCommand('ping')"
                  "mongodb://$MONGO_INITDB_ROOT_USERNAME:$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin?authSource=admin"
            initialDelaySeconds: {{ .Values.mongodb.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mongodb.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.mongodb.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.mongodb.livenessProbe.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - >-
                  mongosh --quiet --eval "db.adminCommand('ping')"
                  "mongodb://$MONGO_INITDB_ROOT_USERNAME:$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin?authSource=admin"
            initialDelaySeconds: {{ .Values.mongodb.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mongodb.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.mongodb.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.mongodb.readinessProbe.failureThreshold }}
          # MongoDB entrypoint requires CAP_CHOWN and root for initial data dir
          # setup. Container-level security restrictions are not applied here;
          # network-level isolation via NetworkPolicy protects MongoDB instead.
  volumeClaimTemplates:
    {{- if .Values.mongodb.persistence.data.enabled }}
    - metadata:
        name: mongodb-data
      spec:
        accessModes: [ {{ .Values.mongodb.persistence.data.accessMode | quote }} ]
        {{- if .Values.mongodb.persistence.data.storageClass }}
        storageClassName: {{ .Values.mongodb.persistence.data.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongodb.persistence.data.size }}
    {{- end }}
    {{- if .Values.mongodb.persistence.configdb.enabled }}
    - metadata:
        name: mongodb-configdb
      spec:
        accessModes: [ {{ .Values.mongodb.persistence.configdb.accessMode | quote }} ]
        {{- if .Values.mongodb.persistence.configdb.storageClass }}
        storageClassName: {{ .Values.mongodb.persistence.configdb.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongodb.persistence.configdb.size }}
    {{- end }}
{{- end }}
