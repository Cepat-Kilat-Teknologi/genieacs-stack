{{- /* --------------------------------------------------------------------------
  ServiceAccount
  Creates a dedicated ServiceAccount for GenieACS pods. Use annotations
  for cloud IAM integration (AWS IRSA, GCP Workload Identity, Azure AD).
  -------------------------------------------------------------------------- */}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "genieacs.serviceAccountName" . }}
  labels:
    {{- include "genieacs.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
