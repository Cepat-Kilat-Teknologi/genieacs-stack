{{- /* --------------------------------------------------------------------------
  Helm Test Pod (default variant)
  Verifies that GenieACS UI, NBI API, and MongoDB are reachable after
  installation. Run with: helm test <release-name>
  -------------------------------------------------------------------------- */}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "genieacs.fullname" . }}-test-connection"
  labels:
    {{- include "genieacs.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-genieacs-ui
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          echo "Testing GenieACS UI on port {{ .Values.genieacs.service.ports.ui }}..."
          wget -q -O /dev/null --spider --timeout=10 \
            http://{{ include "genieacs.fullname" . }}:{{ .Values.genieacs.service.ports.ui }}/ \
            && echo "PASS: GenieACS UI is reachable" \
            || (echo "FAIL: GenieACS UI is not reachable" && exit 1)
    - name: test-genieacs-nbi
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          echo "Testing GenieACS NBI API on port {{ .Values.genieacs.service.ports.nbi }}..."
          wget -q -O /dev/null --spider --timeout=10 \
            http://{{ include "genieacs.fullname" . }}:{{ .Values.genieacs.service.ports.nbi }}/devices \
            && echo "PASS: GenieACS NBI API is reachable" \
            || (echo "FAIL: GenieACS NBI API is not reachable" && exit 1)
    - name: test-mongodb
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          echo "Testing MongoDB on port {{ .Values.mongodb.service.port }}..."
          nc -z -w 10 {{ include "genieacs.mongodb.name" . }} {{ .Values.mongodb.service.port }} \
            && echo "PASS: MongoDB is reachable" \
            || (echo "FAIL: MongoDB is not reachable" && exit 1)
