apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: genieacs
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # !! REQUIRED: Replace before deployment !!
  # Generate password with: openssl rand -base64 24
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "REPLACE_ME--openssl-rand-base64-24"
