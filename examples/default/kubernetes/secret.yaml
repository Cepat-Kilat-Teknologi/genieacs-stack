apiVersion: v1
kind: Secret
metadata:
  name: genieacs-secret
  namespace: genieacs
  labels:
    app.kubernetes.io/name: genieacs
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # !! REQUIRED: Replace before deployment !!
  # Generate with: openssl rand -hex 32
  # WARNING: kubectl apply will succeed with the placeholder, but GenieACS
  # sessions will be trivially forgeable. Rotate immediately if deployed as-is.
  GENIEACS_UI_JWT_SECRET: "REPLACE_ME--openssl-rand-hex-32"
