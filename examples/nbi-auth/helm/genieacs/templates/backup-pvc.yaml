{{- /* --------------------------------------------------------------------------
  MongoDB Backup PVC
  Provides persistent storage for MongoDB backups created by the backup
  CronJob. Disabled by default; enable via backup.persistence.enabled.
  -------------------------------------------------------------------------- */}}
{{- if and .Values.backup.enabled .Values.backup.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "genieacs.fullname" . }}-mongodb-backup
  labels:
    {{- include "genieacs.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - {{ .Values.backup.persistence.accessMode }}
  {{- if .Values.backup.persistence.storageClass }}
  storageClassName: {{ .Values.backup.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.backup.persistence.size }}
{{- end }}
