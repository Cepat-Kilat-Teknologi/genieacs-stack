{{- /* --------------------------------------------------------------------------
  NBI Auth Secret
  Stores the NBI API key used by the nginx sidecar for request validation.
  Skipped when nbiAuth.existingSecret is set, allowing external secret
  management (e.g., External Secrets Operator, Sealed Secrets, Vault).
  -------------------------------------------------------------------------- */}}
{{- if .Values.nbiAuth.enabled }}
{{- if not .Values.nbiAuth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "genieacs.fullname" . }}-nbi-auth
  labels:
    {{- include "genieacs.labels" . | nindent 4 }}
    app.kubernetes.io/component: nbi-auth
type: Opaque
stringData:
  NBI_API_KEY: {{ required "nbiAuth.apiKey must be set" .Values.nbiAuth.apiKey | quote }}
{{- end }}
{{- end }}
