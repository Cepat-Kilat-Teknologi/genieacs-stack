# NetworkPolicy: restricts MongoDB ingress to GenieACS pods only.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, Weave Net).
# Without this, any pod in the namespace can connect to MongoDB.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-allow-genieacs-only
  namespace: genieacs
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: genieacs
      ports:
        - port: 27017
          protocol: TCP
