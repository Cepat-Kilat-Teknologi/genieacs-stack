# Nginx ConfigMap for NBI API Key Auth
#
# !! REQUIRED: Replace the API key placeholder before deployment !!
#
# The API key below MUST be replaced with a strong random value:
#   openssl rand -hex 32
#
# For better security, store the API key in a Kubernetes Secret and use
# an init container with envsubst to inject it at pod startup. See the
# Helm chart variant (examples/nbi-auth/helm/) for a production-ready
# implementation with existingSecret support.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-nbi-config
  namespace: genieacs
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        access_log /dev/stdout;

        server {
            listen 7558;
            server_name localhost;

            # Health check endpoint (no auth required)
            location /health {
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            location / {
                # Validate X-API-Key header
                # !! REPLACE this value before deployment !!
                # Generate with: openssl rand -hex 32
                if ($http_x_api_key != "REPLACE_ME--openssl-rand-hex-32") {
                    return 401 "Invalid or missing X-API-Key";
                }

                proxy_pass http://127.0.0.1:7557;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-API-Key $http_x_api_key;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
            }
        }
    }
